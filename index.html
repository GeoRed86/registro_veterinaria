<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinaria</title>
</head>
<body>
    <h1>Registro Veterinaria</h1>
    
    <input type="text" id="mascotaNombre" placeholder="Nombre de la Mascota">
    <input type="text" id="mascotaEspecie" placeholder="Especie de la Mascota">
    <input type="text" id="mascotaPropietario" placeholder="Nombre del Dueño de la Mascota">
    <input type="number" id="mascotaEdad" placeholder="Edad de la Mascota">
    

    <button id="btnRegistrar">Registrar Mascota</button>

    <p id="mensaje"></p>

    <h2>Registro Mascotas</h2>
    <ul id="listaRegistro"></ul>

    <h3>Buscar Mascota</h3>
    <input type="text" id="buscarMascota" placeholder="Nombre Mascota">

    <button id="btnBuscar">Buscar</button>

    <h3>Filtro Por Estado</h3>

    <h2>Totales Parciales</h2>
    <h3 id="totalMascotas">Total de Mascotas: 0</h3>
    <h3 id="totalPendientes">Total de Mascotas Pendientes: 0</h3>
    <h3 id="totalEnAtencion">Total de Mascotas En Atencion: 0</h3>
    <h3 id="totalDeAlta">Total de Mascotas De Alta: 0</h3>

    <script src="script.js"></script>
</body>
</html>
